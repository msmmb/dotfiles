cursor:
  style: Beam

theme: Railscasts.dark
colors:
  name: Railscasts (dark)
  author: Chris Kempson
  primary:
    background: "#2b2b2b"
    foreground: "#e6e1dc"
  cursor:
    text: "#2b2b2b"
    cursor: "#e6e1dc"
  normal:
    black: "#2b2b2b"
    red: "#da4939"
    green: "#a5c261"
    yellow: "#ffc66d"
    blue: "#6d9cbe"
    magenta: "#b6b3eb"
    cyan: "#519f50"
    white: "#e6e1dc"
  bright:
    black: "#5a647e"
    red: "#da4939"
    green: "#a5c261"
    yellow: "#ffc66d"
    blue: "#6d9cbe"
    magenta: "#b6b3eb"
    cyan: "#519f50"
    white: "#f9f7f3"

font:
  bold:
    family: JetBrains Mono ExtraBold Nerd Font
    style: Bold
  italic:
    family: JetBrains Mono ExtraBold Nerd Font
    style: Italic
  normal:
    family: JetBrains Mono ExtraBold Nerd Font
    style: Bold
  size: 9

env:
  WINIT_X11_SCALE_FACTOR: "1.0"

window:
  opacity: 1
  dimensions:
    columns: 140
    lines: 40
  #position:
  #x: 2480
  #y: 300
  padding:
    x: 15
    y: 15
